<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biz &mdash; Birlikte Geçen Zaman</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

  /* ========================================================
     DÜZENLENEBİLİR AYARLAR — Sadece burayı değiştirmen yeterli
     ======================================================== */
  :root{
    /* Pastel palet */
    --cream:     #FDF6F0;
    --blush:     #F7C9DA;
    --lavender:  #D9CCF2;
    --mint:      #C7F0DE;
    --plum:      #4B3B4F;
    --gold:      #F0BE7E;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html{ scroll-behavior:smooth; }

  body{
    font-family:'Quicksand', sans-serif;
    background:var(--cream);
    color:var(--plum);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  /* ---------- Arka plan: yumuşak akan pastel lekeler ---------- */
  .bg-blobs{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
    pointer-events:none;
  }
  .blob{
    position:absolute;
    border-radius:50%;
    filter:blur(70px);
    opacity:.55;
    animation:drift 22s ease-in-out infinite;
  }
  .blob.b1{ width:420px; height:420px; background:var(--blush); top:-120px; left:-100px; animation-delay:0s; }
  .blob.b2{ width:380px; height:380px; background:var(--lavender); top:20%; right:-140px; animation-delay:4s; }
  .blob.b3{ width:340px; height:340px; background:var(--mint); bottom:-140px; left:10%; animation-delay:8s; }
  .blob.b4{ width:260px; height:260px; background:var(--gold); bottom:10%; right:5%; opacity:.35; animation-delay:2s; }

  @keyframes drift{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(30px,-40px) scale(1.08); }
  }

  /* ---------- Uçuşan kalpler ---------- */
  .hearts{ position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
  .heart{
    position:absolute;
    bottom:-40px;
    font-size:18px;
    color:var(--blush);
    opacity:.7;
    animation:float-up linear infinite;
    user-select:none;
  }
  @keyframes float-up{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:.8; }
    90%{ opacity:.6; }
    100%{ transform:translateY(-110vh) translateX(20px) rotate(25deg); opacity:0; }
  }

  /* ---------- İçerik ---------- */
  .wrap{
    position:relative;
    z-index:2;
    max-width:880px;
    margin:0 auto;
    padding:64px 24px 80px;
    text-align:center;
  }

  .eyebrow{
    font-size:14px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--plum);
    opacity:.55;
    font-weight:600;
    margin-bottom:18px;
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:clamp(34px, 6vw, 60px);
    line-height:1.1;
    letter-spacing:-0.01em;
  }
  h1 em{
    font-style:italic;
    font-weight:500;
    color:#C97F9E;
  }

  .since{
    margin-top:14px;
    font-size:16px;
    opacity:.65;
    font-weight:500;
  }

  /* ---------- Sayaç: kalp biçiminde kümelenmiş kartlar ---------- */
  .counter{
    margin-top:56px;
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:16px;
    max-width:760px;
    margin-left:auto;
    margin-right:auto;
  }

  .unit{
    background:rgba(255,255,255,.55);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.7);
    border-radius:22px;
    padding:22px 8px 18px;
    box-shadow:0 12px 30px -12px rgba(75,59,79,.18);
    animation:breathe 4.5s ease-in-out infinite;
  }
  .unit:nth-child(2){ animation-delay:.2s; }
  .unit:nth-child(3){ animation-delay:.4s; }
  .unit:nth-child(4){ animation-delay:.6s; }
  .unit:nth-child(5){ animation-delay:.8s; }

  @keyframes breathe{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-6px); }
  }

  .unit .num{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:clamp(28px, 5vw, 42px);
    color:var(--plum);
    font-variant-numeric:tabular-nums;
  }
  .unit .label{
    margin-top:4px;
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--plum);
    opacity:.55;
    font-weight:600;
  }

  .unit.gold{ background:linear-gradient(160deg, rgba(240,190,126,.35), rgba(255,255,255,.5)); }

  /* ---------- Saniye satırı (küçük, nabız gibi) ---------- */
  .seconds-row{
    margin-top:18px;
    font-size:14px;
    opacity:.55;
    font-weight:500;
  }
  .seconds-row .sec-num{
    font-weight:700;
    color:#C97F9E;
    font-variant-numeric:tabular-nums;
  }

  /* ---------- Alt mesaj ---------- */
  .message{
    margin-top:64px;
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:500;
    font-size:clamp(18px, 3vw, 22px);
    line-height:1.6;
    max-width:520px;
    margin-left:auto;
    margin-right:auto;
    color:var(--plum);
    opacity:.85;
  }

  .divider{
    width:48px;
    height:2px;
    background:var(--blush);
    border-radius:2px;
    margin:40px auto;
  }

  footer{
    margin-top:60px;
    font-size:12px;
    opacity:.4;
    font-weight:500;
  }

  /* ---------- Mobil uyum ---------- */
  @media (max-width:640px){
    .counter{ grid-template-columns:repeat(3, 1fr); }
    .unit{ padding:18px 6px 14px; }
    .wrap{ padding:48px 18px 60px; }
  }
  @media (max-width:380px){
    .counter{ grid-template-columns:repeat(2, 1fr); gap:12px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

  <div class="bg-blobs">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="blob b4"></div>
  </div>
  <div class="hearts" id="hearts"></div>

  <div class="wrap">
    <div class="eyebrow">Aşkımızın Zamanı</div>

    <h1>Seninle geçen <em>her an</em><br>bir hediye</h1>

    <div class="since">20 Haziran 2026'dan beri birlikteyiz</div>

    <div class="counter" id="counter">
      <div class="unit"><div class="num" id="years">0</div><div class="label">Yıl</div></div>
      <div class="unit"><div class="num" id="months">0</div><div class="label">Ay</div></div>
      <div class="unit"><div class="num" id="days">0</div><div class="label">Gün</div></div>
      <div class="unit"><div class="num" id="hours">0</div><div class="label">Saat</div></div>
      <div class="unit gold"><div class="num" id="minutes">0</div><div class="label">Dakika</div></div>
    </div>

    <div class="seconds-row">ve <span class="sec-num" id="seconds">0</span> saniye ✨</div>

    <div class="divider"></div>

    <p class="message">
      "Zaman geçtikçe anladım ki, sana olan aşkım saatlerle, günlerle
      değil; kalbimin her atışıyla ölçülüyor."
    </p>

    <footer>Sonsuza kadar, seninle 💗</footer>
  </div>

<script>
  // ============================================================
  // DÜZENLENEBİLİR: Birlikte olmaya başladığınız tarih/saat
  // Format: YYYY, AY-1 (0=Ocak), GÜN, SAAT, DAKİKA
  // ============================================================
  const startDate = new Date(2026, 5, 20, 0, 0, 0); // 20 Haziran 2026, 00:00

  function calcDiff(start, now){
    let years = now.getFullYear() - start.getFullYear();
    let months = now.getMonth() - start.getMonth();
    let days = now.getDate() - start.getDate();
    let hours = now.getHours() - start.getHours();
    let minutes = now.getMinutes() - start.getMinutes();
    let seconds = now.getSeconds() - start.getSeconds();

    if(seconds < 0){ seconds += 60; minutes--; }
    if(minutes < 0){ minutes += 60; hours--; }
    if(hours < 0){ hours += 24; days--; }
    if(days < 0){
      const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
      days += prevMonth.getDate();
      months--;
    }
    if(months < 0){ months += 12; years--; }

    return {years, months, days, hours, minutes, seconds};
  }

  function update(){
    const now = new Date();
    const d = calcDiff(startDate, now);
    document.getElementById('years').textContent = d.years;
    document.getElementById('months').textContent = d.months;
    document.getElementById('days').textContent = d.days;
    document.getElementById('hours').textContent = d.hours;
    document.getElementById('minutes').textContent = d.minutes;
    document.getElementById('seconds').textContent = d.seconds;
  }

  update();
  setInterval(update, 1000);

  // ---------- Uçuşan kalp efekti ----------
  const heartsContainer = document.getElementById('hearts');
  const heartChars = ['💗','💕','♡'];
  function spawnHeart(){
    const el = document.createElement('div');
    el.className = 'heart';
    el.textContent = heartChars[Math.floor(Math.random()*heartChars.length)];
    el.style.left = Math.random()*100 + 'vw';
    el.style.fontSize = (12 + Math.random()*14) + 'px';
    const duration = 10 + Math.random()*8;
    el.style.animationDuration = duration + 's';
    heartsContainer.appendChild(el);
    setTimeout(()=> el.remove(), duration*1000);
  }
  setInterval(spawnHeart, 1400);
  for(let i=0;i<5;i++) setTimeout(spawnHeart, i*400);
</script>

</body>
</html>
